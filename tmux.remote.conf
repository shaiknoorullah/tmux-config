# Remote session overrides
# Loaded when SSH is detected — status on top to distinguish from local

set -g status-position top
set -g status-right "\
#{?#{==:#{client_key_table},off},#[fg=#ff4d4d bold] 󰌾 OFF ,}\
#(~/.config/tmux/scripts/task-status.sh)\
#(~/.config/tmux/scripts/git-status.sh #{pane_current_path})\
#[fg=#585880]  #[fg=#6a8cff]#h "
set -g status-right-length 120
