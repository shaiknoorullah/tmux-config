# ╔══════════════════════════════════════════════════════════════════════╗
# ║  tmux.conf — kitty (Super) -> tmux (prefix) -> neovim (splits)    ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── Core Settings ──────────────────────────────────────────────────────
unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g history-limit 20000
set -sg escape-time 0
set -g focus-events on
set-window-option -g mode-keys vi
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "xterm-256color"

# ── Dracula+ Color Palette (balanced warm/cool) ──────────────────────
# Cool
color_green="#50fa7b"
color_purple="#bd93f9"
color_blue="#6a8cff"
# Warm
color_orange="#ff9e3b"
color_red="#ff4d4d"
color_yellow="#f5d547"
# Neutral
color_fg="#f8f8f2"
color_dark="#1a1a2e"
color_muted="#585880"

# ── vim-tmux-navigator (smart pane/vim navigation) ────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'S\\+?\\s*n?vim'"

# Prefix bindings (for Super key via kitty -> \x00 + key)
bind-key h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Root bindings (Ctrl+h/j/k/l without prefix — fallback without kitty)
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── Splits (inherit working directory) ────────────────────────────────
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# ── Window Management ─────────────────────────────────────────────────
bind-key t new-window -c "#{pane_current_path}"
bind-key w confirm-before -p "kill pane? (y/n)" kill-pane
bind-key n next-window
bind-key p previous-window
bind-key r command-prompt -I "#W" "rename-window '%%'"

# ── Pane Operations ───────────────────────────────────────────────────
bind-key z resize-pane -Z

# ── Session ────────────────────────────────────────────────────────────
bind-key d detach-client

# ── Power Menu ─────────────────────────────────────────────────────────
bind-key q display-menu -T "#[align=centre] Power Menu" \
  "Detach"         d  "detach" \
  "Kill Server"    k  "confirm-before -p 'kill tmux server? (y/n)' kill-server" \
  "Rename Window"  r  "command-prompt -I '#W' 'rename-window %%'" \
  "List Sessions"  s  "list-sessions"

# ── Browser ────────────────────────────────────────────────────────────
set -g @open_browser_key 'B'
set -g @new_browser_window 'zen-browser --new-window'
set -g @browser_session_dir '$HOME/.config/tmux/browser-sessions'
set -g @browser_launch_on_attach '0'
set -g @browser_close_on_deattach '1'

# ── Zen Tab Switcher (fzf popup) ──────────────────────────────────────
bind-key b display-popup -w 85% -h 75% -E "~/.config/rofi/scripts/zen-tab-switcher.sh"

# ── Config Reload ─────────────────────────────────────────────────────
bind-key R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Window Linking (from samoshkin) ────────────────────────────────────
bind-key L command-prompt -p "Link window from (session:window):" "link-window -s %% -a"

# ── Session Merging (from samoshkin) ───────────────────────────────────
bind-key M command-prompt -p "Merge into session:" \
  "run-shell 'for w in $(tmux list-windows -t \"#S\" -F \"##I\"); do tmux move-window -s \"#S:$w\" -t \"%%\"; done'"

# ── tmux-fzf Configuration ────────────────────────────────────────────
set-environment -g TMUX_FZF_OPTIONS "-p -w 80% -h 50% -m"
set-environment -g TMUX_FZF_PREVIEW 1
set-environment -g TMUX_FZF_ORDER "session|window|pane|command|keybinding|clipboard|process"
set-environment -g TMUX_FZF_PANE_FORMAT \
  "[#{window_name}] #{pane_current_command} [#{pane_width}x#{pane_height}] #{?pane_active,[active],}"

# tmux-fzf keybindings: lowercase = direct, UPPERCASE = fuzzy picker
bind-key f run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/.fzf-tmux #{@tmux_fzf_options}"
bind-key W run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/window.sh switch"
bind-key S run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh switch"
bind-key C run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/command.sh"
bind-key K run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/keybinding.sh"

# Fuzzy-pick tmuxinator projects
bind-key O run-shell -b "tmuxinator list -n | tail -n +2 | \
  fzf-tmux -p -w 60% -h 40% --prompt='Project: ' | \
  xargs tmuxinator start"

# ── Password Manager (pass + fzf) ─────────────────────────────────────
# prefix+* = fuzzy pick password, enter=copy pass, ctrl-u=user, ctrl-o=otp
bind-key '*' run-shell -b "~/.config/tmux/scripts/pass-menu.sh"

# ── Copy Mode & Clipboard ─────────────────────────────────────────────
bind-key -n M-Up copy-mode
bind-key ] paste-buffer
bind-key P choose-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.config/tmux/scripts/yank.sh"
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi D send-keys -X copy-end-of-line
bind-key -T copy-mode-vi A send-keys -X append-selection-and-cancel

# Mouse selection stays in copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "~/.config/tmux/scripts/yank.sh"

# Reduced mouse wheel scroll (2 lines instead of 5)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# ── Activity & Silence Monitoring ─────────────────────────────────────
bind-key m set-window-option monitor-activity \; display "Activity monitoring: #{?monitor-activity,ON,OFF}"
bind-key X command-prompt -p "Silence monitor (seconds):" "set-window-option monitor-silence %%"

# ── Environment Renewal ───────────────────────────────────────────────
bind-key E run-shell "~/.config/tmux/scripts/renew-env.sh" \; display "Environment renewed"

# ── Rename Prompt on New Window ────────────────────────────────────────
set-hook -g after-new-window 'command-prompt -I "" "rename-window '%%'"'

# ── Auto-hide status bar when vim is focused ──────────────────────────
# Hides tmux status when active pane is running neovim (avoids double statusline)
# Reappears automatically when switching to a non-vim pane
set-hook -g pane-focus-in "if-shell 'ps -o comm= -t \"#{pane_tty}\" | grep -qiE \"n?vim\"' 'set status off' 'set status on'"
set-hook -g window-pane-changed "if-shell 'ps -o comm= -t \"#{pane_tty}\" | grep -qiE \"n?vim\"' 'set status off' 'set status on'"

# Manual toggle: prefix+` to show/hide status bar
bind-key ` set status

# ── Nested Session F12 Toggle ─────────────────────────────────────────
bind-key -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=$color_dark,fg=$color_muted" \;\
  set window-status-current-style "bg=$color_dark,fg=$color_muted" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind-key -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  refresh-client -S

# ── Status Bar ─────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 150

# Status style — transparent bg, respects terminal background
set -g status-style "bg=default,fg=$color_fg"

# Left: prefix indicator icon + session name
# 󰠠 when prefix active (orange), 󰤂 when idle (dimmed)
set -g status-left "#[fg=$color_fg,bold]#{?client_prefix,#[fg=$color_orange]󰠠 ,#[dim]󰤂 }#[fg=$color_purple,bold,nodim]#S #[fg=$color_muted,nobold,nodim] "

# Window list — nerd font dot marker for active
set -g window-status-format "#[fg=$color_muted,none,dim]  #I #W#{?window_last_flag, 󰁯,} "
set -g window-status-current-format "#[fg=$color_green,none]  #I #[bold]#W#[nobold]#{?window_zoomed_flag, #[fg=$color_orange]󰁌,} "
set -g window-status-separator ""

# Right: keys-off + task + git + PR + hostname (scripts emit their own colors)
set -g status-right "\
#{?#{==:#{client_key_table},off},#[fg=$color_red bold] 󰌾 OFF ,}\
#(~/.config/tmux/scripts/task-status.sh)\
#(~/.config/tmux/scripts/git-status.sh #{pane_current_path})\
#(~/.config/tmux/scripts/pr-status.sh #{pane_current_path})\
#[fg=$color_muted]  #[fg=$color_blue]#h "

# Pane borders
set -g pane-border-style "fg=$color_muted"
set -g pane-active-border-style "fg=$color_purple"

# Message style
set -g message-style "fg=$color_orange,bg=default"
set -g message-command-style "fg=$color_orange,bg=default"

# Selection/copy mode highlight
set -g mode-style "fg=$color_dark,bg=$color_purple"

# Copy mode match highlighting
set -g copy-mode-match-style "bg=$color_green,fg=$color_dark"
set -g copy-mode-current-match-style "bg=$color_yellow,fg=$color_dark"

# ── Plugin Configuration ──────────────────────────────────────────────

# extrakto — extract text from pane output via fzf
set -g @extrakto_key 'e'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '80%,50%'
set -g @extrakto_filter_order 'word line path url quote s-quote'
set -g @extrakto_grab_area 'recent'

# tmux-thumbs — vimium-style hint copy
set -g @thumbs-key 'Space'
set -g @thumbs-command 'tmux set-buffer -- {} && tmux paste-buffer'
set -g @thumbs-upcase-command 'xclip -selection clipboard <<< {}'

# tmux-command-palette — keybinding cheatsheet
set -g @command-palette-key '?'

# tmux-task-monitor — session process popup
set -g @task-monitor-key 'T'

# tmux-notify — pane task completion notifications
set -g @tnotify-verbose 'on'
set -g @tnotify-verbose-msg '#S:#W — task finished'
set -g @tnotify-sleep-duration '5'

# tmux-prefix-highlight
set -g @prefix_highlight_fg "$color_dark"
set -g @prefix_highlight_bg "$color_orange"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=$color_dark,bg=$color_purple"

# tmux-sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-pointer ''
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-ls-command 'exa --color=always --icons=always'
set -g @sessionx-additional-options "--color pointer:9,spinner:92,marker:46"

# tmux-resurrect & continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# ── Plugins ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session management
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'sei40kr/tmux-project'

# Fuzzy finding & extraction
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'fcsonline/tmux-thumbs'

# Clipboard & copy
set -g @plugin 'tmux-plugins/tmux-yank'

# Monitoring & discoverability
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'lost-melody/tmux-command-palette'
set -g @plugin 'YlanAllouche/tmux-task-monitor'

# Notifications
set -g @plugin 'rickstaa/tmux-notify'

# Browser integration
set -g @plugin 'ofirgall/tmux-browser'

# ── Remote Session Overrides ──────────────────────────────────────────
if-shell 'test -n "$SSH_CLIENT"' 'source-file ~/.config/tmux/tmux.remote.conf'

# ── TPM ────────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run '~/.config/tmux/plugins/tpm/tpm'
